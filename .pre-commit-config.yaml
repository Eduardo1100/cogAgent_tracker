repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Using a modern version of the Ruff pre-commit hook
    rev: v0.15.4
    hooks:
      # 1. Run the linter and automatically fix what it can (like unused imports)
      - id: ruff-check
        args: ["--fix"]
      # 2. Run the formatter (fixes quotes, spacing, and line lengths)
      - id: ruff-format
