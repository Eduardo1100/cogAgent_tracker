services:
  app:
    build: .
    container_name: cogagent-app
    env_file:
      - .env

    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://cache:6379/0
      S3_ENDPOINT: http://objectstore:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}

      ALFWORLD_DATA: /datasets/alfworld

      UV_PROJECT_ENVIRONMENT: /opt/venv
      UV_CACHE_DIR: /opt/uv-cache
      UV_PYTHON_INSTALL_DIR: /opt/uv-python

      WANDB_DIR: /wandb
      WANDB_CACHE_DIR: /tmp/wandb-cache

    volumes:
      - .:/app
      - venv_storage:/opt/venv
      - uv_cache:/opt/uv-cache
      - uv_python:/opt/uv-python
      - alfworld_data:/datasets/alfworld
      - wandb_data:/wandb

    ports:
      - "8000:8000"

    command: >
      sh -lc "
      set -euo pipefail &&
      uv sync --frozen &&
      bash scripts/bootstrap_alfworld.sh &&
      uv run python -m src.main
      "

    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
      objectstore:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: cogagent-db
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - database-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cache:
    image: redis:7
    container_name: cogagent-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  objectstore:
    image: minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: cogagent-minio
    env_file:
      - .env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - objectstore-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.4.0
    container_name: cogagent-grafana
    env_file:
      - .env
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/cogagent_monitor.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  database-data:
  objectstore-data:
  venv_storage:
  uv_cache:
  uv_python:
  alfworld_data:
  wandb_data:
  grafana-data: