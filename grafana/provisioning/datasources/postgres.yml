apiVersion: 1
datasources:
  - name: PostgreSQL
    type: postgres
    uid: cogagent-pg
    url: db:5432
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      database: ${POSTGRES_DB}
      sslmode: disable
      maxOpenConns: 5
      postgresVersion: 1500
      timescaledb: false
    isDefault: true
