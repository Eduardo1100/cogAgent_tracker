name: CI
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run Ruff Check
        # This checks for bugs and logic errors
        run: uvx ruff check .

      - name: Run Ruff Format
        # This ensures the code style is perfect
        run: uvx ruff format --check .

  test:
    needs: lint # Only run tests if linting passes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true # This saves your .venv between runs!

      - name: Set up Python
        run: uv python install

      - name: Run Tests
        # uv run handles the environment automatically
        run: uv run pytest

  build-docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Load
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false # Set to true once you add Docker Hub/GHCR credentials
          tags: my-ai-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max